app = "doordrill-api"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"
  build_target = ""

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[mounts]
  # No persistent disk needed — all state is in Supabase + Redis
